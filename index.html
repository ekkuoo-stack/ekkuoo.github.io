.music-link {
    display: inline-block;
    width: 180px;
    height: 180px;

    line-height: 180px;
    text-align: center;

    font-size: 20px;
    font-weight: bold;
    color: white;
    text-decoration: none;

    background: #3b82f6;

    clip-path: polygon(
        50% 0%,
        61% 35%,
        98% 35%,
        68% 57%,
        79% 91%,
        50% 70%,
        21% 91%,
        32% 57%,
        2% 35%,
        39% 35%
    );

    animation: pop 1.5s infinite ease-in-out;
}
@keyframes pop {

    0% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.15);
    }

    100% {
        transform: scale(1);
    }

}
