!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image:url('cool blue wallpaper.jpg');
      grond-size: cover;
      ground-position: center;
      ground-repeat: no-repeat;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 7rem;
      color: #F6E27A;
      
      text-shadow: 
       2px 2px 0px white,
       4px 4px 0px rgba (225,225,225,0.3);
        
      background-image:
      repeating-linear-grandient(
         45deg,
         #F6E27A 0px,
         #F6E27A 20px
         #CFE8FF 20px,
         #CFE8FF 40px
         );

      -webkit-background-clip: text;
      -webkit-background-color: transparent;
    }
        
                        
      margin-bottom: 10px;
    }

    p {
      font-size: 2rem;
      color: #FFE98A;
      opacity: 0.8;
    }

    body { 
      font-family: Courier New, Monospace;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>ekkuoo</h1>
    <p>Digital Creater.</p>
    
    <a class="button" href="https://github.com">
      My GitHub
    </a>
  </div>

</body>
</html>
