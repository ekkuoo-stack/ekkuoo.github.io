!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>My Website</title>

  <style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background-color: #cfe8ff;

  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.4) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.4) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.4) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.4) 75%);

  background-size: 80px 80px;
  background-position:
    0 0,
    0 40px,
    40px -40px,
    -40px 0px;

  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;

}

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      display: inline-block:
      
      font-size: 7rem;
      font-weight:bold,
        
      background:
      repeating-linear-grandient(
         45deg,
         #F6E27A 0px,
         #F6E27A 20px
         #CFE8FF 20px,
         #CFE8FF 40px
         );

      color: transperant;

      -webkit-background-clip: text;
      background-color: text;

      text-shadow:
      1px 1px 2px rgba(0,0,0,0.2);
    }
        
                        
      margin-bottom: 10px;
    }

    p {
      font-size: 2rem;
      color: #FFE98A;
      opacity: 0.8;
    }

    body {

    }

      text-decoration: none;

      font-weight: bold;

      opacity: 0.8;
    }
